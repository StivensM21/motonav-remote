<!DOCTYPE html>
<html lang="ru">
<head>
<meta charset="utf-8">
<meta name="viewport" content="width=device-width, initial-scale=1">
<title>MotoNav — пульт</title>
<style>
  :root{--bg:#0E1013;--card:#21252B;--edge:#3A4048;--ink:#F4F3EF;--dim:#8A929C;--amber:#FFB627;--mint:#6FD3C7}
  *{box-sizing:border-box;margin:0;padding:0}
  body{background:var(--bg);color:var(--ink);font-family:system-ui,sans-serif;padding:20px;min-height:100vh}
  h1{font-size:20px;letter-spacing:.05em;text-transform:uppercase;margin-bottom:4px}
  .sub{color:var(--dim);font-size:13px;margin-bottom:20px}
  .card{background:var(--card);border:1px solid var(--edge);border-radius:10px;padding:16px;margin-bottom:14px}
  label{display:block;font-size:11px;letter-spacing:.1em;text-transform:uppercase;color:var(--dim);margin-bottom:6px}
  input{width:100%;background:#171B20;border:1px solid var(--edge);border-radius:6px;color:var(--ink);
        padding:11px;font-size:16px;margin-bottom:12px}
  button{width:100%;padding:14px;border:0;border-radius:8px;font-size:15px;font-weight:600;
         background:var(--amber);color:#151719;cursor:pointer;margin-bottom:8px}
  button.ghost{background:#2C323A;color:var(--ink);border:1px solid var(--edge)}
  button:disabled{opacity:.4}
  .row{display:flex;gap:20px;margin-top:10px}
  .stat{flex:1}
  .stat b{display:block;font-size:26px}
  .stat span{font-size:11px;color:var(--dim);text-transform:uppercase;letter-spacing:.08em}
  #log{font-family:ui-monospace,monospace;font-size:12px;color:var(--dim);line-height:1.6;
       max-height:160px;overflow:auto;white-space:pre-wrap}
  .dot{display:inline-block;width:8px;height:8px;border-radius:50%;background:#555;margin-right:6px}
  .dot.on{background:var(--mint)}
  select{width:100%;background:#171B20;border:1px solid var(--edge);border-radius:6px;color:var(--ink);
         padding:11px;font-size:16px;margin-bottom:12px}
  input[type=range]{padding:0;height:32px;accent-color:var(--amber)}
  .battbar{height:8px;background:#171B20;border:1px solid var(--edge);border-radius:4px;overflow:hidden}
  .battbar div{height:100%;width:0%;background:var(--mint);transition:width .4s}
  .battbar div.low{background:#E05A4E}
</style>
</head>
<body>
<h1>MotoNav</h1>
<div class="sub">Телефон считает маршрут. Устройство только рисует. Приложение ставить не нужно — это страница.</div>

<div class="card">
  <button id="connect"><span class="dot" id="dot"></span>Подключить устройство</button>
  <button id="wake" class="ghost">Не гасить экран телефона</button>
</div>

<div class="card">
  <label>Куда едем — адрес или координаты</label>
  <input id="dest" placeholder="Weerschip 59, Almere — или 52.37, 4.89" value="">
  <button id="go" disabled>Построить маршрут и поехали</button>
</div>

<div class="card">
  <div class="row">
    <div class="stat"><b id="mDist">—</b><span>до поворота</span></div>
    <div class="stat"><b id="mType">—</b><span>манёвр</span></div>
    <div class="stat"><b id="mSpd">0</b><span>км/ч</span></div>
  </div>
</div>

<div class="card" id="devCard" style="display:none">
  <label>Устройство</label>
  <div class="row" style="margin-top:0;margin-bottom:14px">
    <div class="stat"><b id="dBatt">—</b><span id="dBattSub">батарея</span></div>
    <div class="stat"><b id="dVolt">—</b><span>вольтаж</span></div>
  </div>
  <div class="battbar"><div id="battFill"></div></div>

  <label style="margin-top:16px">Спящий режим — уснуть через</label>
  <select id="cfgSleep">
    <option value="2">2 минуты</option>
    <option value="3">3 минуты</option>
    <option value="5">5 минут</option>
    <option value="10" selected>10 минут</option>
    <option value="15">15 минут</option>
    <option value="30">30 минут</option>
    <option value="0">Никогда не спать</option>
  </select>

  <label>Яркость экрана — <span id="cfgBriVal">80</span>%</label>
  <input type="range" id="cfgBri" min="10" max="100" step="5" value="80">

  <button id="cfgSave" class="ghost">Применить настройки</button>
</div>

<div class="card"><div id="log">Ожидание. Страница v4 — перестроение и съезды.</div></div>

<script>
const SVC = "6e6f7600-b5a3-f393-e0a9-e50e24dcca9e";
const CHR = "6e6f7601-b5a3-f393-e0a9-e50e24dcca9e"; // навигация: страница → устройство
// протокол v1, см. PROTOCOL.md в репозитории:
const CHR_STATE = "6e6f7602-b5a3-f393-e0a9-e50e24dcca9e"; // статус (read/notify): [ver][батарея %][флаги][mV lo][mV hi]
const CHR_CFG   = "6e6f7603-b5a3-f393-e0a9-e50e24dcca9e"; // настройки (read/write): [ver][сон, мин (0=никогда)][яркость %]

let chr = null, cfgChr = null, steps = [], watchId = null, wakeLock = null;
let routeGeom = [], gIdx = 0, lastPos = null; // геометрия маршрута для отрисовки дороги на устройстве
let cumDist = [0];                            // накопленная дистанция вдоль геометрии — для дуги прогресса
const $ = id => document.getElementById(id);
const log = m => { $('log').textContent = m + "\n" + $('log').textContent; };

// --- BLE ---
$('connect').onclick = async () => {
  try {
    const dev = await navigator.bluetooth.requestDevice({
      filters: [{ services: [SVC] }],
      optionalServices: ['battery_service']
    });
    const srv = await dev.gatt.connect();
    const s = await srv.getPrimaryService(SVC);
    chr = await s.getCharacteristic(CHR);
    $('dot').classList.add('on');
    $('go').disabled = false;
    log("Устройство на связи: " + (dev.name || "MotoNav"));
    dev.addEventListener('gattserverdisconnected', () => {
      chr = null; cfgChr = null;
      $('dot').classList.remove('on');
      $('devCard').style.display = 'none';
      log("Связь потеряна.");
    });
    await initDevicePanel(srv, s);
  } catch (e) { log("Ошибка BLE: " + e.message); }
};

// --- панель устройства: батарея + настройки ---
async function initDevicePanel(srv, s) {
  let any = false;

  // статус: наша характеристика, иначе стандартный Battery Service
  try {
    const st = await s.getCharacteristic(CHR_STATE);
    const v = await st.readValue();
    showState(v);
    await st.startNotifications();
    st.addEventListener('characteristicvaluechanged', e => showState(e.target.value));
    any = true;
  } catch (_) {
    try {
      const bs = await srv.getPrimaryService('battery_service');
      const bc = await bs.getCharacteristic('battery_level');
      const showBatt = v => setBattery(v.getUint8(0), null, null);
      showBatt(await bc.readValue());
      await bc.startNotifications();
      bc.addEventListener('characteristicvaluechanged', e => showBatt(e.target.value));
      any = true;
    } catch (_) { log("Прошивка не отдаёт уровень батареи — нужно обновить устройство."); }
  }

  // настройки: сон и яркость
  try {
    cfgChr = await s.getCharacteristic(CHR_CFG);
    const v = await cfgChr.readValue();
    if (v.byteLength >= 3 && v.getUint8(0) === 1) {
      const sleep = v.getUint8(1), bri = v.getUint8(2);
      const opt = [...$('cfgSleep').options].find(o => +o.value === sleep);
      if (opt) opt.selected = true;
      $('cfgBri').value = Math.max(10, Math.min(100, bri));
      $('cfgBriVal').textContent = $('cfgBri').value;
    }
    any = true;
  } catch (_) { log("Прошивка не поддерживает настройки сна/яркости — нужно обновить устройство."); }

  if (any) $('devCard').style.display = 'block';
}

function showState(v) {
  if (v.byteLength < 2 || v.getUint8(0) !== 1) return;
  const pct = v.getUint8(1);
  const charging = v.byteLength >= 3 ? (v.getUint8(2) & 1) : 0;
  const mv = v.byteLength >= 5 ? v.getUint16(3, true) : null;
  setBattery(pct, charging, mv);
}

function setBattery(pct, charging, mv) {
  $('dBatt').textContent = pct + "%";
  $('dBattSub').textContent = charging ? "батарея · заряжается" : "батарея";
  $('dVolt').textContent = mv ? (mv / 1000).toFixed(2) + " В" : "—";
  const f = $('battFill');
  f.style.width = pct + "%";
  f.classList.toggle('low', pct <= 20 && !charging);
  if (pct <= 15 && !charging) log("Батарея устройства садится: " + pct + "%.");
}

$('cfgBri').oninput = () => { $('cfgBriVal').textContent = $('cfgBri').value; };

$('cfgSave').onclick = async () => {
  if (!cfgChr) return log("Настройки недоступны: прошивка их не поддерживает.");
  const buf = new Uint8Array([1, +$('cfgSleep').value, +$('cfgBri').value]);
  try {
    await cfgChr.writeValue(buf);
    const sleep = +$('cfgSleep').value;
    log("Настройки применены: сон — " + (sleep ? sleep + " мин" : "никогда") +
        ", яркость — " + $('cfgBri').value + "%.");
  } catch (e) { log("Не удалось записать настройки: " + e.message); }
};

// экран телефона не должен гаснуть, иначе страница встанет
$('wake').onclick = async () => {
  try { wakeLock = await navigator.wakeLock.request('screen'); log("Экран телефона удержан."); }
  catch (e) { log("Wake Lock недоступен: " + e.message +
                  " — обычно это режим энергосбережения. Выключи Battery Saver или поставь телефон на зарядку."); }
};

// --- назначение: координаты ИЛИ адрес текстом ---
async function resolveDest(text) {
  const parts = text.split(',').map(v => parseFloat(v.trim()));
  if (parts.length === 2 && !isNaN(parts[0]) && !isNaN(parts[1])) {
    return { lat: parts[0], lon: parts[1] };         // это уже координаты
  }
  // это адрес — геокодим через Nominatim (OpenStreetMap)
  log("Ищу адрес…");
  const url = "https://nominatim.openstreetmap.org/search?format=json&limit=1&q=" +
              encodeURIComponent(text);
  const r = await fetch(url).then(x => x.json());
  if (!r.length) { log("Адрес не найден. Уточни или введи координаты."); return null; }
  log("Нашёл: " + r[0].display_name);
  return { lat: parseFloat(r[0].lat), lon: parseFloat(r[0].lon) };
}

// --- маршрут через OSRM ---
let destLL = null, rerouting = false, lastReroute = 0;

async function buildRoute(fromLat, fromLon, quiet) {
  if (!destLL) return false;
  const from = `${fromLon},${fromLat}`;
  const to = `${destLL.lon},${destLL.lat}`;
  const url = `https://router.project-osrm.org/route/v1/driving/${from};${to}` +
              `?overview=full&geometries=geojson&steps=true&annotations=false`;
  if (!quiet) log("Считаю маршрут…");
  let r;
  try { r = await fetch(url).then(x => x.json()); }
  catch (e) { log("Сеть недоступна для маршрута: " + e.message); return false; }
  if (r.code !== 'Ok') { log("OSRM отказал: " + r.code); return false; }

  // манёвры → координата поворота + боковые съезды перекрёстка (для #5)
  steps = r.routes[0].legs[0].steps.map(s => {
    const it = (s.intersections && s.intersections[0]) || null;
    let side = [];
    if (it && it.bearings) {
      const skip = new Set([it.bearings[it.in], it.bearings[it.out]]);
      side = it.bearings.filter(b => !skip.has(b));   // абсолютные азимуты боковых дорог
    }
    return { lat: s.maneuver.location[1], lon: s.maneuver.location[0],
             type: mapType(s.maneuver), side, done: false };
  });
  routeGeom = r.routes[0].geometry.coordinates.map(c => ({ lat: c[1], lon: c[0] }));
  cumDist = [0];
  for (let i = 1; i < routeGeom.length; i++)
    cumDist[i] = cumDist[i - 1] + haversine(routeGeom[i-1].lat, routeGeom[i-1].lon,
                                            routeGeom[i].lat, routeGeom[i].lon);
  gIdx = 0; lastPos = null;
  if (!quiet) log(`Маршрут готов: ${steps.length} манёвров, ${(r.routes[0].distance/1000).toFixed(1)} км.`);
  return true;
}

$('go').onclick = async () => {
  const dest = await resolveDest($('dest').value);
  if (!dest) return;
  destLL = dest;
  const me = await new Promise((res, rej) =>
    navigator.geolocation.getCurrentPosition(res, rej, { enableHighAccuracy: true }));
  if (await buildRoute(me.coords.latitude, me.coords.longitude, false)) startRide();
};

// OSRM → наш enum: 0 прямо, 1 направо, 2 налево, 3 круговой, 4 разворот, 5 финиш
function mapType(m) {
  if (m.type === 'arrive') return 5;
  if (m.type === 'roundabout' || m.type === 'rotary') return 3;
  const mod = m.modifier || '';
  if (mod === 'uturn') return 4;
  if (mod.includes('right')) return 1;
  if (mod.includes('left')) return 2;
  return 0;
}

// --- поездка: раз в секунду шлём 10 байт ---
function startRide() {
  if (watchId) navigator.geolocation.clearWatch(watchId);
  watchId = navigator.geolocation.watchPosition(onFix, e => log("GPS: " + e.message),
                                                { enableHighAccuracy: true, maximumAge: 1000 });
}

function haversine(a, b, c, d) {
  const R = 6371000, r = Math.PI / 180;
  const dLat = (c - a) * r, dLon = (d - b) * r;
  const s = Math.sin(dLat/2)**2 + Math.cos(a*r) * Math.cos(c*r) * Math.sin(dLon/2)**2;
  return 2 * R * Math.asin(Math.sqrt(s));
}

function bearingTo(la1, lo1, la2, lo2) {
  const r = Math.PI / 180;
  const y = Math.sin((lo2 - lo1) * r) * Math.cos(la2 * r);
  const x = Math.cos(la1 * r) * Math.sin(la2 * r) -
            Math.sin(la1 * r) * Math.cos(la2 * r) * Math.cos((lo2 - lo1) * r);
  return Math.atan2(y, x) / r;
}

let lastSend = 0;
function onFix(pos) {
  if (!chr || !steps.length) return;
  if (Date.now() - lastSend < 350) return;           // ~3 Гц — меньше задержки в движении
  lastSend = Date.now();

  const { latitude: la, longitude: lo, speed, heading } = pos.coords;

  // ближайший невыполненный манёвр
  const next = steps.find(s => !s.done);
  if (!next) return;
  const d = haversine(la, lo, next.lat, next.lon);
  if (d < 25) { next.done = true; }                  // поворот пройден

  const kmh = Math.round((speed || 0) * 3.6);

  // курс: из GPS; стоим на месте — по последним точкам; иначе на ближайший манёвр
  let hdg = (heading !== null && !isNaN(heading) && kmh > 3) ? heading : null;
  if (hdg === null && lastPos) {
    const dE = (lo - lastPos.lon) * Math.cos(la * Math.PI / 180) * 111320;
    const dN = (la - lastPos.lat) * 110540;
    if (Math.hypot(dE, dN) > 3) hdg = Math.atan2(dE, dN) * 180 / Math.PI;
  }
  if (hdg === null) hdg = bearingTo(la, lo, next.lat, next.lon);
  lastPos = { lat: la, lon: lo };

  // двигаем указатель по геометрии маршрута к ближайшей точке
  while (gIdx < routeGeom.length - 1 &&
         haversine(la, lo, routeGeom[gIdx + 1].lat, routeGeom[gIdx + 1].lon) <=
         haversine(la, lo, routeGeom[gIdx].lat, routeGeom[gIdx].lon)) gIdx++;

  // #3 — съезд с маршрута: далеко от линии → автоматически перестроить
  const offDist = haversine(la, lo, routeGeom[gIdx].lat, routeGeom[gIdx].lon);
  if (offDist > 45 && !rerouting && Date.now() - lastReroute > 8000) {
    rerouting = true; lastReroute = Date.now();
    log("Съехал с маршрута — перестраиваю…");
    buildRoute(la, lo, true).then(ok => {
      rerouting = false; log(ok ? "Маршрут перестроен." : "Не удалось перестроить.");
    });
  }

  const hr = hdg * Math.PI / 180, S = 0.45;
  const rot = (lat2, lon2) => {                       // точка (lat,lon) → пиксели, курс вверх
    const e = (lon2 - lo) * Math.cos(la * Math.PI / 180) * 111320;
    const n = (lat2 - la) * 110540;
    return [e * Math.cos(hr) - n * Math.sin(hr), e * Math.sin(hr) + n * Math.cos(hr)];
  };
  const clamp = v => Math.max(-127, Math.min(127, Math.round(v)));

  // дорога впереди (~450 м) → пиксели; плотнее точки = глаже линия (#1)
  const pts = [];
  let acc = 0, prev = { lat: la, lon: lo };
  for (let i = gIdx + 1; i < routeGeom.length && pts.length < 16 && acc < 450; i++) {
    const p = routeGeom[i];
    const seg = haversine(prev.lat, prev.lon, p.lat, p.lon);
    if (seg < 8 && i < routeGeom.length - 1) continue;    // лёгкое прореживание
    acc += seg; prev = p;
    const [x, y] = rot(p.lat, p.lon);
    pts.push([clamp(x * S), clamp(y * S)]);
  }

  // #5 — боковые съезды у ближайшего поворота (если он в поле зрения)
  const [mxr, myr] = rot(next.lat, next.lon);
  const mx = mxr * S, my = myr * S;
  const manOn = Math.abs(mx) < 118 && (182 - my) > 6 && (182 - my) < 236;
  const stubs = [];
  if (manOn && next.side) for (const b of next.side.slice(0, 6)) {
    const th = b * Math.PI / 180, e = Math.sin(th), n = Math.cos(th);   // азимут съезда
    const sx = (e * Math.cos(hr) - n * Math.sin(hr)) * 22;
    const sy = (e * Math.sin(hr) + n * Math.cos(hr)) * 22;
    stubs.push([clamp(sx), clamp(sy)]);
  }

  // пакет v4: заголовок + дорога + точка поворота + боковые съезды (см. PROTOCOL.md)
  const total = cumDist[cumDist.length - 1] || 1;
  const prog = Math.max(0, Math.min(100, Math.round((cumDist[gIdx] || 0) / total * 100)));
  const buf = new Uint8Array(10 + pts.length * 2 + stubs.length * 2);
  const dv = new DataView(buf.buffer);
  dv.setUint8(0, 4);
  dv.setUint8(1, next.type);
  dv.setUint16(2, Math.min(65535, Math.round(d)), true);
  dv.setUint8(4, Math.min(255, kmh));
  dv.setUint8(5, prog);
  dv.setUint8(6, pts.length);
  pts.forEach((p, i) => { dv.setInt8(7 + i * 2, p[0]); dv.setInt8(8 + i * 2, p[1]); });
  let o = 7 + pts.length * 2;
  dv.setInt8(o, manOn ? clamp(mx) : -128); dv.setInt8(o + 1, manOn ? clamp(my) : -128);
  dv.setUint8(o + 2, stubs.length);
  stubs.forEach((p, i) => { dv.setInt8(o + 3 + i * 2, p[0]); dv.setInt8(o + 4 + i * 2, p[1]); });

  chr.writeValueWithoutResponse(buf.buffer).catch(e => log("Отправка: " + e.message));

  $('mDist').textContent = Math.round(d) + " м";
  $('mType').textContent = ['прямо','направо','налево','круг','разворот','финиш'][next.type];
  $('mSpd').textContent = kmh;
}
</script>
</body>
</html>
